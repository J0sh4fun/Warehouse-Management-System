spring.application.name=WarehouseRentalDB

# ==================== DATABASE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/warehouserentaldb?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Dat mat khau qua bien moi truong DB_PASSWORD, hoac tao file application-local.properties
# Trong application-local.properties them dong: spring.datasource.password=YOUR_PASSWORD
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / HIBERNATE  ====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
# Keep column names as declared in @Column(name=...), no snake_case conversion
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ==================== JWT ====================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ==================== SERVER ====================
server.port=8080

# ==================== SWAGGER / OPENAPI ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
